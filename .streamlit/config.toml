[theme]
primaryColor = "#1B6CA8"
backgroundColor = "#F8FAFD"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#0F172A"
font = "sans serif"
base = "light"

[server]
address = "localhost"
maxUploadSize = 50
enableCORS = true
enableXsrfProtection = true
# "poll" = check for file changes periodically (avoids Mac/OneDrive FSEvents crash; still auto-reloads)
fileWatcherType = "poll"

[browser]
gatherUsageStats = false
